<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeRide Parent Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <h1>SafeRide Parent Portal</h1>
    <p>Register as a parent and schedule your child's ride home.</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Parent Registration</h2>
      <form id="registerForm">
        <label for="parentName">Full Name</label>
        <input type="text" id="parentName" placeholder="Enter full name" required />

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter email" required />

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter phone number" required />

        <label for="childName">Child Name</label>
        <input type="text" id="childName" placeholder="Enter child name" required />

        <button type="submit">Register Parent</button>
      </form>
      <p id="registerMessage" class="message"></p>
    </section>

    <section class="card">
      <h2>Schedule Ride</h2>
      <form id="rideForm">
        <label for="pickupLocation">School Pickup Location</label>
        <input type="text" id="pickupLocation" placeholder="Enter school pickup location" required />

        <label for="homeAddress">Home Address</label>
        <input type="text" id="homeAddress" placeholder="Enter home address" required />

        <label for="pickupDate">Pickup Date</label>
        <input type="date" id="pickupDate" required />

        <label for="pickupTime">Pickup Time</label>
        <input type="time" id="pickupTime" required />

        <button type="submit">Schedule Ride</button>
      </form>
      <p id="rideMessage" class="message"></p>
    </section>

    <section class="card">
      <h2>Saved Data Preview</h2>
      <div id="dataPreview"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
